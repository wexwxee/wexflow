<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Автопилот — WexFlow</title>
<style>
  :root {
    --bg:#0e0f10; --card:#16191b; --line:#262b2e; --txt:#e7eae8; --muted:#9aa3a0;
    --accent:#3ddc84; --amber:#f5a623; --red:#e5484d;
  }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--txt);
    font-family:"Segoe UI",system-ui,sans-serif; font-size:14px; }
  .wrap { padding:14px 14px 18px; display:grid; gap:12px; }
  .top { display:flex; align-items:center; gap:10px; }
  .top h1 { margin:0; font-size:16px; display:flex; align-items:center; gap:7px; }
  .top h1 .zap { color:var(--amber); }
  .badge { margin-left:auto; display:inline-flex; align-items:center; gap:6px; padding:4px 10px;
    border-radius:999px; font-size:11.5px; font-weight:800; border:1px solid var(--line);
    background:#1b1f21; color:var(--muted); white-space:nowrap; }
  .badge .dot { width:7px; height:7px; border-radius:999px; background:currentColor; }
  .badge.on { color:var(--accent); border-color:color-mix(in srgb,var(--accent) 40%,var(--line)); }
  .badge.run { color:var(--amber); border-color:color-mix(in srgb,var(--amber) 45%,var(--line)); }
  .badge.run .dot { animation:pulse 1.2s ease-out infinite; }
  @keyframes pulse { 0%{box-shadow:0 0 0 0 color-mix(in srgb,var(--amber) 55%,transparent);} 70%{box-shadow:0 0 0 6px transparent;} 100%{box-shadow:0 0 0 0 transparent;} }
  .statusline { margin:0; color:var(--muted); font-size:12px; line-height:1.4; }
  .stats { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; }
  .stat { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:10px 11px; }
  .stat b { display:block; font-size:21px; line-height:1; }
  .stat span { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; }
  .actions { display:flex; gap:8px; }
  .btn { flex:1; min-height:34px; border-radius:9px; border:1px solid var(--line); background:#1b1f21;
    color:var(--txt); font-weight:700; font-size:12.5px; cursor:pointer; }
  .btn:hover { border-color:#3a4145; }
  .btn.primary { background:var(--accent); color:#07100b; border-color:var(--accent); }
  .btn.warn { color:var(--red); border-color:color-mix(in srgb,var(--red) 40%,var(--line)); }
  .btn:disabled { opacity:.55; cursor:not-allowed; }
  .logbox { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:8px 10px;
    max-height:230px; overflow:auto; display:grid; gap:5px; }
  .logbox .title { font-size:10px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); }
  .ev { display:flex; align-items:center; gap:7px; font-size:12px; }
  .ev .d { width:6px; height:6px; border-radius:999px; flex:0 0 auto; background:var(--muted); }
  .ev.scan .d { background:#38b6ff; } .ev.submit .d { background:var(--accent); } .ev.prepare .d { background:var(--amber); }
  .ev .t { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .ev .tm { color:var(--muted); font-size:10.5px; white-space:nowrap; }
  .empty { color:var(--muted); font-size:12px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <h1><span class="zap">⚡</span> Автопилот</h1>
    <span class="badge" id="badge"><span class="dot"></span> …</span>
  </div>
  <p class="statusline" id="statusline">Загружаю…</p>
  <div class="stats">
    <div class="stat"><b id="found">0</b><span>нашёл</span></div>
    <div class="stat"><b id="prepared">0</b><span>подготовил</span></div>
    <div class="stat"><b id="today">0</b><span>подал сегодня</span></div>
    <div class="stat"><b id="total">0</b><span>подал всего</span></div>
  </div>
  <div class="actions">
    <button class="btn" id="pause" type="button">Пауза</button>
    <button class="btn" id="scan" type="button">↻ Проверить</button>
  </div>
  <div class="logbox">
    <div class="title">Журнал событий</div>
    <div id="log"><div class="empty">Загружаю…</div></div>
  </div>
</div>
<script>
(function(){
  var fast=false, timer=null;
  function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m];});}
  function clock(e){try{return new Date(e*1000).toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});}catch(x){return'';}}
  function rel(p,n){if(!p)return'';var s=Math.max(0,n-p);if(s<45)return'только что';var m=Math.round(s/60);if(m<60)return m+' мин назад';var h=Math.round(m/60);if(h<24)return h+' ч назад';return Math.round(h/24)+' дн назад';}
  function fut(t,n){if(!t)return'';var m=Math.round((t-n)/60);if(m<=0)return'вот-вот';if(m<60)return'через ~'+m+' мин';return'через ~'+Math.round(m/60)+' ч';}

  function renderLog(events){
    var box=document.getElementById('log');
    if(!events||!events.length){box.innerHTML='<div class="empty">Событий пока нет.</div>';return;}
    box.innerHTML=events.map(function(e){
      var k=e.kind||'info'; var tm=''; try{tm=clock(new Date(e.ts).getTime()/1000);}catch(x){}
      return '<div class="ev '+k+'"><span class="d"></span><span class="t">'+esc(e.text||'')+'</span><span class="tm">'+tm+'</span></div>';
    }).join('');
  }
  function render(d){
    if(!d)return;
    var now=d.now||(Date.now()/1000);
    var b=document.getElementById('badge'), s=document.getElementById('statusline');
    if(d.running){b.className='badge run';b.innerHTML='<span class="dot"></span> Проверяет…';}
    else if(d.enabled){b.className='badge on';b.innerHTML='<span class="dot"></span> Работает';}
    else{b.className='badge';b.innerHTML='<span class="dot"></span> Пауза';}
    if(d.running)s.textContent='Идёт проверка базы вакансий…';
    else if(!d.enabled)s.textContent='На паузе. Нажми «Включить», чтобы автопилот искал сам.';
    else if(d.last_scan){var t='Проверка: '+clock(d.last_scan)+' ('+rel(d.last_scan,now)+')';if(d.next_scan)t+=' · след. '+fut(d.next_scan,now);t+=' · каждые '+(d.every_min||30)+' мин';s.textContent=t;}
    else s.textContent='Ещё не проверял — запустится автоматически.';
    document.getElementById('found').textContent=d.found||0;
    document.getElementById('prepared').textContent=d.prepared||0;
    document.getElementById('today').textContent=(d.submitted_today||0)+(d.daily_limit?' / '+d.daily_limit:'');
    document.getElementById('total').textContent=d.submitted_total||0;
    var p=document.getElementById('pause');
    if(d.enabled){p.textContent='Пауза';p.className='btn warn';}else{p.textContent='Включить';p.className='btn primary';}
    renderLog(d.events||[]);
    if(!!d.running!==fast){fast=!!d.running;schedule();}
  }
  function poll(){fetch('/api/autopilot/status').then(function(r){return r.json();}).then(render).catch(function(){});}
  function schedule(){if(timer)clearInterval(timer);timer=setInterval(poll,fast?2500:9000);}
  document.getElementById('scan').addEventListener('click',function(){
    var b=this;b.disabled=true;
    fetch('/api/autopilot/scan-now',{method:'POST'}).then(function(r){return r.json();})
      .then(function(){fast=true;schedule();poll();setTimeout(function(){b.disabled=false;},2500);})
      .catch(function(){b.disabled=false;});
  });
  document.getElementById('pause').addEventListener('click',function(){
    var b=this;b.disabled=true;
    fetch('/api/autopilot/toggle',{method:'POST'}).then(function(r){return r.json();})
      .then(function(){poll();setTimeout(function(){b.disabled=false;},400);})
      .catch(function(){b.disabled=false;});
  });
  poll(); schedule();
})();
</script>
</body>
</html>
