<!doctype html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}WexFlow{% endblock %}</title>
<link rel="icon" type="image/png" href="/static/wexflow_mark.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script>
  // применяем сохранённую тему ДО отрисовки, чтобы не мигало.
  // cookie общая для 127.0.0.1 (все порты) — тема едина для Salling и 7-Eleven.
  (function () {
    var m = document.cookie.match(/(?:^|;\s*)jobhub_theme=(dark|light)/);
    var t = (m && m[1]) || localStorage.getItem("jobhub-theme") || "dark";
    document.documentElement.dataset.theme = t;
    var params = new URLSearchParams(location.search);
    if (params.get("app_shell") === "edgeapp") {
      document.documentElement.classList.add("edge-app-shell");
    }
  })();
</script>
<link rel="stylesheet" href="/static/theme.css?v=20260614-app">
{% block style %}{% endblock %}
</head>
<body>
<div class="desktop-framebar" aria-label="Window controls">
  <div class="desktop-traffic" role="group" aria-label="Window controls">
    <button type="button" class="traffic-dot traffic-close" data-window-control="close" aria-label="Close"></button>
    <button type="button" class="traffic-dot traffic-minimize" data-window-control="minimize" aria-label="Minimize"></button>
    <button type="button" class="traffic-dot traffic-maximize" data-window-control="toggle_maximize" aria-label="Maximize"></button>
  </div>
  <div class="desktop-frame-title">WexFlow</div>
</div>
{% block body %}{% endblock %}
<script>
  // переключатель темы — иконки sun/moon переключаются через CSS (html[data-theme])
  document.querySelectorAll("[data-theme-toggle]").forEach(function (btn) {
    btn.addEventListener("click", function () {
      var next = document.documentElement.dataset.theme === "light" ? "dark" : "light";
      document.documentElement.dataset.theme = next;
      try { localStorage.setItem("jobhub-theme", next); } catch (e) {}
      document.cookie = "jobhub_theme=" + next + ";path=/;max-age=31536000;samesite=lax";
    });
  });
</script>
<script>
  // тонкий индикатор загрузки при переходах между страницами
  (function () {
    var bar = document.createElement("div");
    bar.className = "wexnav-progress";
    document.body.appendChild(bar);
    var timer = null, w = 0;
    function start() {
      if (timer) return;
      w = 10; bar.classList.add("go"); bar.style.width = w + "%";
      timer = setInterval(function () {
        w += Math.max(0.6, (92 - w) * 0.09);
        if (w > 92) w = 92;
        bar.style.width = w + "%";
      }, 180);
    }
    function done() {
      if (timer) { clearInterval(timer); timer = null; }
      bar.style.width = "100%";
      setTimeout(function () { bar.classList.remove("go"); bar.style.width = "0"; }, 280);
    }
    window.addEventListener("beforeunload", start);
    window.addEventListener("pageshow", done);
    // отправка форм — индикатор + «крутилка» на нажатой кнопке
    document.addEventListener("submit", function (e) {
      start();
      var b = e.submitter;
      if (b && b.tagName === "BUTTON" && !b.classList.contains("pwd-eye")) {
        b.classList.add("loading");
      }
    });
  })();
</script>
<script>
  (function () {
    document.querySelectorAll("[data-window-control]").forEach(function (button) {
      button.addEventListener("click", function (event) {
        event.preventDefault();
        event.stopPropagation();
        var action = button.dataset.windowControl;
        var api = window.pywebview && window.pywebview.api;
        if (api && typeof api[action] === "function") {
          api[action]();
        }
      });
    });
  })();
</script>
<script src="/static/window_chrome.js?v=20260614-drag-resize"></script>
{% block script %}{% endblock %}
</body>
</html>
