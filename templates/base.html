<!doctype html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Salling Jobs{% endblock %}</title>
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script>
  // применяем сохранённую тему ДО отрисовки, чтобы не мигало.
  // cookie общая для 127.0.0.1 (все порты) — тема едина для Salling и 7-Eleven.
  (function () {
    var m = document.cookie.match(/(?:^|;\s*)jobhub_theme=(dark|light)/);
    var t = (m && m[1]) || localStorage.getItem("jobhub-theme") || "dark";
    document.documentElement.dataset.theme = t;
  })();
</script>
<link rel="stylesheet" href="/static/theme.css">
{% block style %}{% endblock %}
</head>
<body>
{% block body %}{% endblock %}
<script>
  // переключатель темы — иконки sun/moon переключаются через CSS (html[data-theme])
  document.querySelectorAll("[data-theme-toggle]").forEach(function (btn) {
    btn.addEventListener("click", function () {
      var next = document.documentElement.dataset.theme === "light" ? "dark" : "light";
      document.documentElement.dataset.theme = next;
      try { localStorage.setItem("jobhub-theme", next); } catch (e) {}
      document.cookie = "jobhub_theme=" + next + ";path=/;max-age=31536000;samesite=lax";
    });
  });
</script>
{% block script %}{% endblock %}
</body>
</html>
